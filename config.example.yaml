# LLM 差异分析器配置文件
# 复制此文件为 config.yaml 并填入实际值

# 分析器配置 - 用于分析差异、打标签等
analyzer:
  model_name: "kimi-k2.5:free"
  api_type: "openai"
  # 从环境变量读取: ROUTIN_API_KEY
  api_key: "${ROUTIN_API_KEY}"
  base_url: "https://api.routin.ai/v1"

# 问题生成器配置 - 用于生成问题
generator:
  model_name: "kimi-k2.5:free"
  api_type: "openai"
  # 从环境变量读取: ROUTIN_API_KEY
  api_key: "${ROUTIN_API_KEY}"
  base_url: "https://api.routin.ai/v1"

# 用于生成回答的模型列表（全部使用 NVIDIA API）
# 一个模型生成失败不影响其他模型生成回答
models:
  - name: "seed-oss-36b-instruct"
    model_name: "seed-oss-36b-instruct"
    api_type: "openai"
    # 从环境变量读取: NVIDIA_API_KEY
    api_key: "${NVIDIA_API_KEY}"
    base_url: "https://integrate.api.nvidia.com/v1"
    enabled: true

  - name: "qwq-32b"
    model_name: "qwq-32b"
    api_type: "openai"
    api_key: "${NVIDIA_API_KEY}"
    base_url: "https://integrate.api.nvidia.com/v1"
    enabled: true

  - name: "deepseek-r1-distill-qwen-14b"
    model_name: "deepseek-r1-distill-qwen-14b"
    api_type: "openai"
    api_key: "${NVIDIA_API_KEY}"
    base_url: "https://integrate.api.nvidia.com/v1"
    enabled: true

  - name: "kimi-k2-thinking"
    model_name: "kimi-k2-thinking"
    api_type: "openai"
    api_key: "${NVIDIA_API_KEY}"
    base_url: "https://integrate.api.nvidia.com/v1"
    enabled: true

  - name: "qwen3-coder-480b-a35b-instruct"
    model_name: "qwen3-coder-480b-a35b-instruct"
    api_type: "openai"
    api_key: "${NVIDIA_API_KEY}"
    base_url: "https://integrate.api.nvidia.com/v1"
    enabled: true

  - name: "devstral-2-123b-instruct-2512"
    model_name: "devstral-2-123b-instruct-2512"
    api_type: "openai"
    api_key: "${NVIDIA_API_KEY}"
    base_url: "https://integrate.api.nvidia.com/v1"
    enabled: true

  - name: "qwen3-next-80b-a3b-thinking"
    model_name: "qwen3-next-80b-a3b-thinking"
    api_type: "openai"
    api_key: "${NVIDIA_API_KEY}"
    base_url: "https://integrate.api.nvidia.com/v1"
    enabled: true

# 分析参数
analysis:
  question_count: 5
  use_example_style: true

# 持续运行配置（支持长期运行）
continuous:
  enabled: false  # 是否启用持续运行模式
  interval_minutes: 60  # 运行间隔（分钟）
  max_runs: null  # 最大运行次数，null 表示无限运行
  similarity_threshold: 0.85  # 问题相似度阈值（0-1）
  history_file: null  # 问题历史文件路径，null 使用默认路径
  archive_days: 365  # 归档超过多少天的问题
